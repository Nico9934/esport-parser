services:
  db:
    image: postgres:16
    restart: always
    environment:
      POSTGRES_DB: esbscout
      POSTGRES_USER: scout
      POSTGRES_PASSWORD: scout123
    ports:
      - "5433:5432"
    volumes:
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
