<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ESB Scout</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;600;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0f;
    --surface: #111118;
    --surface2: #1a1a24;
    --border: #2a2a3a;
    --accent: #00ff88;
    --accent2: #ff4466;
    --accent3: #ffaa00;
    --text: #e8e8f0;
    --muted: #666680;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: 'Syne', sans-serif; min-height: 100vh; }
  body::before {
    content: '';
    position: fixed; inset: 0;
    background-image: linear-gradient(rgba(0,255,136,0.03) 1px, transparent 1px), linear-gradient(90deg, rgba(0,255,136,0.03) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none; z-index: 0;
  }
  .wrapper { position: relative; z-index: 1; max-width: 1000px; margin: 0 auto; padding: 2rem 1.5rem; }

  header { margin-bottom: 2rem; }
  .logo-main { font-size: 1.8rem; font-weight: 800; letter-spacing: -0.03em; }
  .logo-main span { color: var(--accent); }
  .logo-sub { font-family: 'Space Mono', monospace; font-size: 0.6rem; color: var(--muted); letter-spacing: 0.15em; margin-top: 4px; }

  .tabs { display: flex; gap: 4px; margin-bottom: 2rem; border-bottom: 1px solid var(--border); }
  .tab { font-family: 'Space Mono', monospace; font-size: 0.7rem; letter-spacing: 0.1em; padding: 10px 18px; cursor: pointer; color: var(--muted); border-bottom: 2px solid transparent; margin-bottom: -1px; transition: all 0.2s; text-transform: uppercase; }
  .tab.active { color: var(--accent); border-bottom-color: var(--accent); }
  .tab:hover:not(.active) { color: var(--text); }

  /* MULTI PANEL */
  .section-label { font-family: 'Space Mono', monospace; font-size: 0.65rem; color: var(--muted); letter-spacing: 0.12em; text-transform: uppercase; margin-bottom: 1rem; }

  .match-row {
    display: grid;
    grid-template-columns: 1fr 1fr 36px;
    gap: 8px;
    margin-bottom: 8px;
    align-items: center;
  }
  .match-row input {
    background: var(--surface); border: 1px solid var(--border); color: var(--text);
    padding: 10px 14px; border-radius: 8px; font-family: 'Space Mono', monospace;
    font-size: 0.82rem; outline: none; transition: border-color 0.2s; width: 100%;
  }
  .match-row input:focus { border-color: var(--accent); }
  .match-row input::placeholder { color: var(--muted); }
  .match-row input.has-result { border-color: var(--accent); }
  .match-row input.has-error { border-color: var(--accent2); }

  .btn-remove {
    background: transparent; border: 1px solid var(--border); color: var(--muted);
    width: 36px; height: 36px; border-radius: 8px; cursor: pointer; font-size: 1rem;
    display: flex; align-items: center; justify-content: center; transition: all 0.15s;
    flex-shrink: 0;
  }
  .btn-remove:hover { border-color: var(--accent2); color: var(--accent2); }

  .actions { display: flex; gap: 10px; margin-top: 1rem; flex-wrap: wrap; }
  .btn {
    background: var(--accent); color: #000; border: none; padding: 11px 24px;
    border-radius: 8px; font-family: 'Space Mono', monospace; font-size: 0.75rem;
    font-weight: 700; cursor: pointer; transition: all 0.15s; white-space: nowrap;
  }
  .btn:hover { background: #00ffaa; transform: translateY(-1px); }
  .btn:active { transform: translateY(0); }
  .btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }
  .btn.secondary { background: transparent; color: var(--text); border: 1px solid var(--border); }
  .btn.secondary:hover { border-color: var(--accent); color: var(--accent); background: transparent; }

  /* RESULTS */
  .results-grid { margin-top: 2rem; display: flex; flex-direction: column; gap: 12px; }

  .result-card {
    background: var(--surface); border: 1px solid var(--border); border-radius: 14px;
    padding: 1.2rem 1.5rem; display: grid;
    grid-template-columns: 1fr auto 1fr auto;
    gap: 12px; align-items: center;
    transition: border-color 0.2s;
  }
  .result-card.loading { opacity: 0.5; }
  .result-card.error { border-color: var(--accent2); }

  .player-side { display: flex; flex-direction: column; gap: 4px; }
  .player-side.right { text-align: right; align-items: flex-end; }
  .p-nick { font-size: 1.05rem; font-weight: 800; letter-spacing: -0.02em; }
  .p-nick.winner { color: var(--accent); }
  .p-nick.loser { color: var(--muted); }
  .p-stats { font-family: 'Space Mono', monospace; font-size: 0.65rem; color: var(--muted); }
  .p-wr { font-family: 'Space Mono', monospace; font-size: 0.85rem; font-weight: 700; }
  .p-wr.winner { color: var(--accent); }
  .p-wr.loser { color: var(--muted); }

  .vs-col { text-align: center; font-weight: 800; color: var(--muted); font-size: 0.9rem; padding: 0 4px; }
  .vs-diff { font-family: 'Space Mono', monospace; font-size: 0.55rem; color: var(--muted); }

  .verdict-col { text-align: right; min-width: 120px; }
  .verdict-badge {
    display: inline-block; font-family: 'Space Mono', monospace; font-size: 0.65rem;
    padding: 4px 12px; border-radius: 20px; font-weight: 700; white-space: nowrap;
  }
  .badge-green { background: rgba(0,255,136,0.15); color: var(--accent); }
  .badge-yellow { background: rgba(255,170,0,0.15); color: var(--accent3); }
  .badge-red { background: rgba(255,68,102,0.15); color: var(--accent2); }
  .verdict-name { font-size: 1rem; font-weight: 800; color: var(--accent); margin-top: 4px; }
  .verdict-odd { font-family: 'Space Mono', monospace; font-size: 0.6rem; color: var(--muted); }

  .error-text { font-family: 'Space Mono', monospace; font-size: 0.7rem; color: var(--accent2); }

  /* URL BOX */
  .url-box {
    background: var(--surface2); border: 1px solid var(--border); border-radius: 10px;
    padding: 1rem 1.2rem; margin-top: 1.5rem;
  }
  .url-box-title { font-family: 'Space Mono', monospace; font-size: 0.6rem; color: var(--muted); letter-spacing: 0.1em; text-transform: uppercase; margin-bottom: 8px; }
  .url-list { display: flex; flex-direction: column; gap: 4px; }
  .url-item {
    font-family: 'Space Mono', monospace; font-size: 0.68rem; color: var(--accent3);
    background: var(--surface); padding: 6px 10px; border-radius: 6px;
    cursor: pointer; transition: background 0.15s; display: flex; justify-content: space-between; align-items: center;
    border: 1px solid transparent;
  }
  .url-item:hover { background: rgba(255,170,0,0.08); border-color: var(--accent3); }
  .url-item .copy-hint { font-size: 0.55rem; color: var(--muted); }

  /* PLAYERS TABLE */
  .players-table-wrap { overflow-x: auto; }
  table { width: 100%; border-collapse: collapse; font-size: 0.85rem; }
  th { font-family: 'Space Mono', monospace; font-size: 0.6rem; color: var(--muted); text-transform: uppercase; letter-spacing: 0.1em; padding: 10px 14px; text-align: left; border-bottom: 1px solid var(--border); white-space: nowrap; }
  td { padding: 10px 14px; border-bottom: 1px solid rgba(42,42,58,0.5); vertical-align: middle; }
  tr:hover td { background: rgba(0,255,136,0.03); }
  .nick-cell { font-weight: 600; cursor: pointer; }
  .nick-cell:hover { color: var(--accent); }
  .empty { text-align: center; padding: 2rem; font-family: 'Space Mono', monospace; font-size: 0.75rem; color: var(--muted); }

  .input-row { display: flex; gap: 10px; margin-bottom: 1.5rem; flex-wrap: wrap; align-items: flex-end; }
  .input-group { display: flex; flex-direction: column; gap: 4px; flex: 1; min-width: 160px; }
  .input-group label { font-family: 'Space Mono', monospace; font-size: 0.6rem; color: var(--muted); letter-spacing: 0.1em; text-transform: uppercase; }
  .input-group input, .input-group select {
    background: var(--surface); border: 1px solid var(--border); color: var(--text);
    padding: 10px 14px; border-radius: 8px; font-family: 'Space Mono', monospace;
    font-size: 0.85rem; outline: none;
  }

  @media (max-width: 640px) {
    .result-card { grid-template-columns: 1fr 1fr; grid-template-rows: auto auto; }
    .vs-col { display: none; }
    .verdict-col { grid-column: 1/-1; text-align: left; }
  }
</style>
</head>
<body>
<div class="wrapper">
  <header>
    <div class="logo-main">ESB<span>Scout</span></div>
    <div class="logo-sub">ESPORTS BATTLE · ANALIZADOR DE TANDAS</div>
  </header>

  <div class="tabs">
    <div class="tab active" onclick="showTab('multi')">⚡ Tanda completa</div>
    <div class="tab" onclick="showTab('players')">👥 Jugadores</div>
  </div>

  <!-- TAB MULTI -->
  <div id="tab-multi">
    <div class="section-label">// ingresá los partidos de la tanda</div>

    <div id="matchRows">
      <!-- rows injected by JS -->
    </div>

    <div class="actions">
      <button class="btn" id="analyzeBtn" onclick="analyzeAll()">⚡ ANALIZAR TANDA →</button>
      <button class="btn secondary" onclick="addRow()">+ AGREGAR PARTIDO</button>
      <button class="btn secondary" onclick="clearAll()">LIMPIAR</button>
    </div>

    <div id="urlBox" style="display:none">
      <div class="url-box">
        <div class="url-box-title">// abrí estas URLs en el browser (hacé click para copiar)</div>
        <div class="url-list" id="urlList"></div>
      </div>
    </div>

    <div id="resultsGrid" class="results-grid"></div>
  </div>

  <!-- TAB PLAYERS -->
  <div id="tab-players" style="display:none">
    <div class="input-row">
      <div class="input-group">
        <label>Buscar</label>
        <input type="text" id="searchInput" placeholder="filtrar..." oninput="filterPlayers()"/>
      </div>
      <div class="input-group" style="max-width:200px">
        <label>Ordenar</label>
        <select id="sortBy" onchange="filterPlayers()">
          <option value="winRate">Win% partidos</option>
          <option value="matches">Partidos totales</option>
        </select>
      </div>
    </div>
    <div class="players-table-wrap">
      <table>
        <thead>
          <tr><th>#</th><th>Jugador</th><th>Win%</th><th>W/D/L</th><th>Partidos</th><th>Nivel</th></tr>
        </thead>
        <tbody id="playersTableBody">
          <tr><td colspan="6" class="empty">Cargando...</td></tr>
        </tbody>
      </table>
    </div>
  </div>
</div>

<script>
let allPlayers = [];
let rowCount = 0;
const BASE = 'https://football.esportsbattle.com/api/participants';

// ── ROWS ──────────────────────────────────────────────────────
function addRow(p1='', p2='') {
  rowCount++;
  const id = rowCount;
  const div = document.createElement('div');
  div.className = 'match-row';
  div.id = `row-${id}`;
  div.innerHTML = `
    <input type="text" id="p1-${id}" placeholder="Jugador 1 (ej: chevare)" value="${p1}" list="playerList"/>
    <input type="text" id="p2-${id}" placeholder="Jugador 2 (ej: hit)" value="${p2}" list="playerList"/>
    <button class="btn-remove" onclick="removeRow(${id})" title="Quitar">×</button>
  `;
  document.getElementById('matchRows').appendChild(div);
}

function removeRow(id) {
  const el = document.getElementById(`row-${id}`);
  if (el) el.remove();
}

function clearAll() {
  document.getElementById('matchRows').innerHTML = '';
  document.getElementById('resultsGrid').innerHTML = '';
  document.getElementById('urlBox').style.display = 'none';
  rowCount = 0;
  addRow(); addRow(); addRow();
}

function getRows() {
  const rows = document.querySelectorAll('.match-row');
  const result = [];
  rows.forEach(row => {
    const id = row.id.replace('row-','');
    const p1 = document.getElementById(`p1-${id}`)?.value.trim();
    const p2 = document.getElementById(`p2-${id}`)?.value.trim();
    if (p1 && p2) result.push({id, p1, p2});
  });
  return result;
}

// ── ANALYZE ───────────────────────────────────────────────────
async function analyzeAll() {
  const rows = getRows();
  if (!rows.length) { alert('Ingresá al menos un partido'); return; }

  const btn = document.getElementById('analyzeBtn');
  btn.disabled = true; btn.textContent = 'ANALIZANDO...';

  // Show URL box
  const urlList = document.getElementById('urlList');
  urlList.innerHTML = rows.map(r => {
    const url = `${BASE}/${r.p1}/compare/${r.p2}`;
    return `<div class="url-item" onclick="copyUrl('${url}', this)">
      <span>${url}</span>
      <span class="copy-hint">click para copiar</span>
    </div>`;
  }).join('');
  document.getElementById('urlBox').style.display = 'block';

  // Render loading cards
  const grid = document.getElementById('resultsGrid');
  grid.innerHTML = rows.map(r => `
    <div class="result-card loading" id="card-${r.id}">
      <div class="player-side"><div class="p-nick">${r.p1}</div></div>
      <div class="vs-col">VS</div>
      <div class="player-side right"><div class="p-nick">${r.p2}</div></div>
      <div class="verdict-col"><span style="font-family:'Space Mono',monospace;font-size:0.7rem;color:var(--muted)">cargando...</span></div>
    </div>`).join('');

  // Fetch all in parallel
  await Promise.allSettled(rows.map(r => fetchAndRender(r)));

  btn.disabled = false; btn.textContent = '⚡ ANALIZAR TANDA →';
}

async function fetchAndRender(r) {
  const card = document.getElementById(`card-${r.id}`);
  try {
    const res = await fetch(`${BASE}/${r.p1}/compare/${r.p2}`);
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const data = await res.json();
    if (!Array.isArray(data) || data.length < 2) throw new Error('Sin datos');
    renderCard(card, data[0], data[1]);
  } catch(e) {
    card.classList.add('error');
    card.classList.remove('loading');
    card.innerHTML = `
      <div style="grid-column:1/-1">
        <span class="error-text">Error cargando ${r.p1} vs ${r.p2} — verificá los nicknames (mayúsculas exactas)</span>
      </div>`;
  }
}

function renderCard(card, p1, p2) {
  const m1 = p1.totalMatches||1, m2 = p2.totalMatches||1;
  const w1 = p1.totalWin||0, w2 = p2.totalWin||0;
  const l1 = p1.totalLose||0, l2 = p2.totalLose||0;
  const d1 = p1.totalDraw||0, d2 = p2.totalDraw||0;
  const wr1 = w1/m1*100, wr2 = w2/m2*100;
  const diff = Math.abs(wr1-wr2);
  const winner = wr1 >= wr2 ? p1 : p2;
  const loser  = winner === p1 ? p2 : p1;
  const wrW = winner===p1 ? wr1 : wr2;
  const wrL = winner===p1 ? wr2 : wr1;

  // Sample size warning
  const sampleWarn = m1 < 100 || m2 < 100;

  let confLabel, confCls;
  if (diff >= 8)      { confLabel='ALTA';  confCls='badge-green'; }
  else if (diff >= 4) { confLabel='MEDIA'; confCls='badge-yellow'; }
  else                { confLabel='BAJA';  confCls='badge-red'; }

  const verdict = diff < 3 ? 'PASAR' : winner.nickname;

  card.classList.remove('loading');
  card.innerHTML = `
    <div class="player-side">
      <div class="p-nick ${winner===p1?'winner':'loser'}">${p1.nickname} ${winner===p1?'👑':''}</div>
      <div class="p-wr ${winner===p1?'winner':'loser'}">${wr1.toFixed(1)}%</div>
      <div class="p-stats">${w1.toLocaleString()}W / ${d1.toLocaleString()}D / ${l1.toLocaleString()}L</div>
      <div class="p-stats">${m1.toLocaleString()} partidos</div>
    </div>
    <div class="vs-col">
      VS<br><span class="vs-diff">+${diff.toFixed(1)}%</span>
    </div>
    <div class="player-side right">
      <div class="p-nick ${winner===p2?'winner':'loser'}">${p2.nickname} ${winner===p2?'👑':''}</div>
      <div class="p-wr ${winner===p2?'winner':'loser'}">${wr2.toFixed(1)}%</div>
      <div class="p-stats">${w2.toLocaleString()}W / ${d2.toLocaleString()}D / ${l2.toLocaleString()}L</div>
      <div class="p-stats">${m2.toLocaleString()} partidos</div>
    </div>
    <div class="verdict-col">
      <span class="verdict-badge ${confCls}">${confLabel}</span><br>
      <div class="verdict-name">${verdict}</div>
      ${sampleWarn ? `<div class="verdict-odd" style="color:var(--accent3)">⚠ muestra chica</div>` : ''}
    </div>`;
}

function copyUrl(url, el) {
  navigator.clipboard.writeText(url).then(() => {
    el.querySelector('.copy-hint').textContent = '✓ copiado';
    setTimeout(() => el.querySelector('.copy-hint').textContent = 'click para copiar', 1500);
  });
}

// ── PLAYERS ───────────────────────────────────────────────────
async function loadAllPlayers() {
  try {
    const r = await fetch(`${BASE}?page=1`);
    const d = await r.json();
    const total = d.totalPages||1;
    let all = [...(d.participants||[])];
    const rest = await Promise.allSettled(
      Array.from({length:total-1},(_,i)=>fetch(`${BASE}?page=${i+2}`).then(r=>r.json()))
    );
    rest.forEach(r=>{if(r.status==='fulfilled')all.push(...(r.value.participants||[]));});
    allPlayers = all.filter(p=>p.nickname&&p.totalMatches);
    const dl = document.getElementById('playerList');
    if (dl) dl.innerHTML = allPlayers.map(p=>`<option value="${p.nickname}">`).join('');
    filterPlayers();
  } catch(e) { console.error(e); }
}

function filterPlayers() {
  const q = (document.getElementById('searchInput')?.value||'').toLowerCase();
  const sort = document.getElementById('sortBy')?.value||'winRate';
  let list = allPlayers.filter(p=>!q||p.nickname.toLowerCase().includes(q));
  list.sort((a,b)=>{
    if(sort==='winRate') return ((b.totalWin||0)/(b.totalMatches||1))-((a.totalWin||0)/(a.totalMatches||1));
    return (b.totalMatches||0)-(a.totalMatches||0);
  });
  const tbody = document.getElementById('playersTableBody');
  if(!list.length){tbody.innerHTML='<tr><td colspan="6" class="empty">Sin resultados</td></tr>';return;}
  const level=(wr,m)=>{
    if(m>15000&&wr>45)return['ÉLITE','badge-green'];
    if(m>8000&&wr>40)return['PRO','badge-green'];
    if(m>3000&&wr>36)return['AVANZADO','badge-yellow'];
    if(m>1000)return['INTERMEDIO','badge-yellow'];
    return['NOVATO','badge-red'];
  };
  tbody.innerHTML=list.map((p,i)=>{
    const wr=p.totalMatches>0?((p.totalWin||0)/p.totalMatches*100):0;
    const[lbl,cls]=level(wr,p.totalMatches||0);
    return`<tr>
      <td style="font-family:'Space Mono',monospace;font-size:0.7rem;color:var(--muted)">${i+1}</td>
      <td class="nick-cell" onclick="fillRow('${p.nickname}')">${p.nickname}</td>
      <td><span style="font-family:'Space Mono',monospace;font-weight:700;color:${wr>45?'var(--accent)':wr>38?'var(--accent3)':'var(--accent2)'}">${wr.toFixed(1)}%</span></td>
      <td style="font-family:'Space Mono',monospace;font-size:0.75rem">
        <span style="color:var(--accent)">${(p.totalWin||0).toLocaleString()}</span>/
        <span style="color:var(--muted)">${(p.totalDraw||0).toLocaleString()}</span>/
        <span style="color:var(--accent2)">${(p.totalLose||0).toLocaleString()}</span>
      </td>
      <td style="font-family:'Space Mono',monospace">${(p.totalMatches||0).toLocaleString()}</td>
      <td><span class="badge-pill ${cls}" style="font-family:'Space Mono',monospace;font-size:0.6rem;padding:2px 8px;border-radius:20px;font-weight:700;background:${cls==='badge-green'?'rgba(0,255,136,0.15)':cls==='badge-yellow'?'rgba(255,170,0,0.15)':'rgba(255,68,102,0.15)'};color:${cls==='badge-green'?'var(--accent)':cls==='badge-yellow'?'var(--accent3)':'var(--accent2)'}">${lbl}</span></td>
    </tr>`;
  }).join('');
}

function fillRow(nick) {
  showTab('multi');
  const rows = document.querySelectorAll('.match-row');
  for (const row of rows) {
    const id = row.id.replace('row-','');
    const p1 = document.getElementById(`p1-${id}`);
    const p2 = document.getElementById(`p2-${id}`);
    if (!p1.value) { p1.value = nick; return; }
    if (!p2.value) { p2.value = nick; return; }
  }
  addRow(nick, '');
}

function showTab(name) {
  ['multi','players'].forEach(t=>{
    document.getElementById(`tab-${t}`).style.display=t===name?'block':'none';
  });
  document.querySelectorAll('.tab').forEach((el,i)=>{
    el.classList.toggle('active',['multi','players'][i]===name);
  });
}

// ── INIT ──────────────────────────────────────────────────────
window.addEventListener('load', () => {
  // datalist
  const dl = document.createElement('datalist');
  dl.id = 'playerList';
  document.body.appendChild(dl);
  // default 3 rows
  addRow(); addRow(); addRow();
  loadAllPlayers();
});
</script>
</body>
</html>
