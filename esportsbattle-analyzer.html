<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ESB Scout</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;600;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0f; --surface: #111118; --surface2: #1a1a24;
    --border: #2a2a3a; --accent: #00ff88; --accent2: #ff4466;
    --accent3: #ffaa00; --text: #e8e8f0; --muted: #666680;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: 'Syne', sans-serif; min-height: 100vh; }
  body::before {
    content: ''; position: fixed; inset: 0;
    background-image: linear-gradient(rgba(0,255,136,0.03) 1px, transparent 1px), linear-gradient(90deg, rgba(0,255,136,0.03) 1px, transparent 1px);
    background-size: 40px 40px; pointer-events: none; z-index: 0;
  }
  .wrapper { position: relative; z-index: 1; max-width: 900px; margin: 0 auto; padding: 2rem 1.5rem; }
  header { margin-bottom: 2rem; }
  .logo-main { font-size: 1.8rem; font-weight: 800; letter-spacing: -0.03em; }
  .logo-main span { color: var(--accent); }
  .logo-sub { font-family: 'Space Mono', monospace; font-size: 0.6rem; color: var(--muted); letter-spacing: 0.15em; margin-top: 4px; }

  .hint { font-family: 'Space Mono', monospace; font-size: 0.65rem; color: var(--muted); margin-bottom: 8px; line-height: 1.8; }
  .hint span { color: var(--accent3); }

  textarea {
    width: 100%; background: var(--surface); border: 1px solid var(--border);
    color: var(--text); padding: 14px 16px; border-radius: 10px;
    font-family: 'Space Mono', monospace; font-size: 0.85rem; line-height: 1.8;
    outline: none; resize: vertical; min-height: 160px; transition: border-color 0.2s;
  }
  textarea:focus { border-color: var(--accent); }
  textarea::placeholder { color: var(--muted); }

  .btn {
    background: var(--accent); color: #000; border: none; padding: 12px 28px;
    border-radius: 8px; font-family: 'Space Mono', monospace; font-size: 0.8rem;
    font-weight: 700; cursor: pointer; transition: all 0.15s; margin-top: 12px;
  }
  .btn:hover { background: #00ffaa; transform: translateY(-1px); }
  .btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }

  .results { margin-top: 2rem; display: flex; flex-direction: column; gap: 10px; }

  .card {
    background: var(--surface); border: 1px solid var(--border); border-radius: 12px;
    padding: 1rem 1.4rem; display: grid; grid-template-columns: 1fr auto 1fr auto;
    gap: 10px; align-items: center; animation: fadeIn 0.2s ease;
  }
  @keyframes fadeIn { from { opacity:0; transform:translateY(-6px); } to { opacity:1; transform:none; } }
  .card.loading { opacity: 0.4; }
  .card.error { border-color: var(--accent2); }

  .side { display: flex; flex-direction: column; gap: 3px; }
  .side.right { text-align: right; align-items: flex-end; }
  .pname { font-size: 1rem; font-weight: 800; }
  .pname.w { color: var(--accent); }
  .pname.l { color: var(--muted); }
  .pwr { font-family: 'Space Mono', monospace; font-size: 0.82rem; font-weight: 700; }
  .pwr.w { color: var(--accent); }
  .pwr.l { color: var(--muted); }
  .pwdl { font-family: 'Space Mono', monospace; font-size: 0.6rem; color: var(--muted); }

  .mid { text-align: center; font-weight: 800; color: var(--muted); font-size: 0.85rem; line-height: 1.6; }
  .mid small { display: block; font-family: 'Space Mono', monospace; font-size: 0.55rem; }

  .rec { text-align: right; min-width: 110px; }
  .rec-name { font-size: 1rem; font-weight: 800; color: var(--accent); }
  .rec-name.pass { color: var(--accent3); }
  .conf {
    display: inline-block; font-family: 'Space Mono', monospace; font-size: 0.6rem;
    padding: 2px 10px; border-radius: 20px; font-weight: 700; margin-top: 3px;
  }
  .c-high { background: rgba(0,255,136,0.15); color: var(--accent); }
  .c-mid  { background: rgba(255,170,0,0.15);  color: var(--accent3); }
  .c-low  { background: rgba(255,68,102,0.15); color: var(--accent2); }
  .warn-small { font-family: 'Space Mono', monospace; font-size: 0.58rem; color: var(--accent3); margin-top: 2px; }
  .err-txt { font-family: 'Space Mono', monospace; font-size: 0.7rem; color: var(--accent2); grid-column: 1/-1; }
</style>
</head>
<body>
<div class="wrapper">
  <header>
    <div class="logo-main">ESB<span>Scout</span></div>
    <div class="logo-sub">ESPORTS BATTLE · ANALIZADOR DE TANDAS</div>
  </header>

  <div class="hint">
    Pegá los partidos, uno por línea:<br>
    <span>chevare vs hit</span><br>
    <span>pikalicaaa vs cappo</span><br>
    <span>Totti vs Duka</span>
  </div>

  <textarea id="input" placeholder="jugador1 vs jugador2&#10;jugador3 vs jugador4&#10;..."></textarea>
  <br>
  <button class="btn" id="btn" onclick="analyzeAll()">⚡ ANALIZAR →</button>

  <div class="results" id="results"></div>
</div>

<script>
const BASE = 'https://football.esportsbattle.com/api/participants';

function parseInput() {
  return document.getElementById('input').value
    .split('\n')
    .map(l => l.trim())
    .filter(l => l.includes('vs'))
    .map(l => {
      const parts = l.split(/\s+vs\s+/i);
      return { p1: parts[0]?.trim(), p2: parts[1]?.trim() };
    })
    .filter(r => r.p1 && r.p2);
}

async function analyzeAll() {
  const rows = parseInput();
  if (!rows.length) { alert('Ingresá partidos en formato: jugador1 vs jugador2'); return; }

  const btn = document.getElementById('btn');
  btn.disabled = true; btn.textContent = 'ANALIZANDO...';

  const grid = document.getElementById('results');
  grid.innerHTML = rows.map((r,i) => `
    <div class="card loading" id="c${i}">
      <div class="side"><div class="pname">${r.p1}</div></div>
      <div class="mid">VS</div>
      <div class="side right"><div class="pname">${r.p2}</div></div>
      <div class="rec" style="font-family:'Space Mono',monospace;font-size:0.7rem;color:var(--muted)">...</div>
    </div>`).join('');

  await Promise.allSettled(rows.map((r,i) => fetchAndRender(r, i)));

  btn.disabled = false; btn.textContent = '⚡ ANALIZAR →';
}

async function fetchAndRender(r, i) {
  const card = document.getElementById(`c${i}`);
  try {
    const res = await fetch(`${BASE}/${r.p1}/compare/${r.p2}`);
    if (!res.ok) throw new Error('HTTP '+res.status);
    const data = await res.json();
    if (!Array.isArray(data) || data.length < 2) throw new Error('sin datos');
    render(card, data[0], data[1]);
  } catch(e) {
    card.classList.replace('loading','error');
    card.innerHTML = `<div class="err-txt">❌ No se encontró "${r.p1}" vs "${r.p2}" — verificá mayúsculas</div>`;
  }
}

function render(card, p1, p2) {
  const m1=p1.totalMatches||1, m2=p2.totalMatches||1;
  const w1=p1.totalWin||0, w2=p2.totalWin||0;
  const l1=p1.totalLose||0, l2=p2.totalLose||0;
  const d1=p1.totalDraw||0, d2=p2.totalDraw||0;
  const wr1=w1/m1*100, wr2=w2/m2*100;
  const diff=Math.abs(wr1-wr2);
  const isP1win = wr1 >= wr2;
  const winner = isP1win ? p1 : p2;
  const rec = diff < 3 ? 'PASAR' : winner.nickname;
  const confCls = diff>=8?'c-high':diff>=4?'c-mid':'c-low';
  const confLbl = diff>=8?'ALTA':diff>=4?'MEDIA':'BAJA';
  const smallSample = m1<100||m2<100;

  card.classList.remove('loading');
  card.innerHTML = `
    <div class="side">
      <div class="pname ${isP1win?'w':'l'}">${p1.nickname}${isP1win?' 👑':''}</div>
      <div class="pwr ${isP1win?'w':'l'}">${wr1.toFixed(1)}%</div>
      <div class="pwdl">${w1.toLocaleString()}W ${d1.toLocaleString()}D ${l1.toLocaleString()}L · ${m1.toLocaleString()}p</div>
    </div>
    <div class="mid">VS<small>+${diff.toFixed(1)}%</small></div>
    <div class="side right">
      <div class="pname ${!isP1win?'w':'l'}">${p2.nickname}${!isP1win?' 👑':''}</div>
      <div class="pwr ${!isP1win?'w':'l'}">${wr2.toFixed(1)}%</div>
      <div class="pwdl">${w2.toLocaleString()}W ${d2.toLocaleString()}D ${l2.toLocaleString()}L · ${m2.toLocaleString()}p</div>
    </div>
    <div class="rec">
      <div class="rec-name ${rec==='PASAR'?'pass':''}">${rec}</div>
      <span class="conf ${confCls}">${confLbl}</span>
      ${smallSample?`<div class="warn-small">⚠ muestra chica</div>`:''}
    </div>`;
}
</script>
</body>
</html>
